[colors]
bg      = #1e1e2e
fg      = #cdd6f4
accent  = #89b4fa
green   = #a6e3a1
yellow  = #f9e2af
red     = #f38ba8
inactive= #45475a

[bar/main]
width = 100%
height = 28
radius = 0
fixed-center = true
background = ${colors.bg}
foreground = ${colors.fg}

font-0 = JetBrains Mono:size=10;2
font-1 = Font Awesome 6 Free:style=Solid:size=11;2
font-2 = Font Awesome 6 Free:style=Regular:size=11;2
font-3 = Font Awesome 6 Brands:style=Regular:size=11;2

modules-left   = i3
modules-center = date
modules-right  = volume network cpu memory

separator = " "
padding-left = 1
padding-right = 1
module-margin = 1

tray-position = right
tray-padding = 4

; ── Modules ──────────────────────────────────────────────

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false

label-focused = %index%
label-focused-foreground = ${colors.accent}
label-focused-padding = 2

label-unfocused = %index%
label-unfocused-foreground = ${colors.inactive}
label-unfocused-padding = 2

label-urgent = %index%
label-urgent-foreground = ${colors.red}
label-urgent-padding = 2

[module/date]
type = internal/date
interval = 1
date = %a %d %b
time = %H:%M
format-prefix = "  "
format-prefix-foreground = ${colors.accent}
label = %date%  %time%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "  "
format-prefix-foreground = ${colors.green}
label = CPU %percentage%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "  "
format-prefix-foreground = ${colors.yellow}
label = RAM %percentage_used%%

[module/network]
type = internal/network
interface = enp9s0
interval = 1

format-connected-prefix = "  "
format-connected-prefix-foreground = ${colors.accent}
label-connected = Connected

format-disconnected-prefix = "  "
format-disconnected-prefix-foreground = ${colors.red}
label-disconnected = Offline

[module/volume]
type = internal/pulseaudio
format-volume-prefix = "  "
format-volume-prefix-foreground = ${colors.accent}
label-volume = %percentage%%

format-muted-prefix = "  "
format-muted-prefix-foreground = ${colors.red}
label-muted = muted
